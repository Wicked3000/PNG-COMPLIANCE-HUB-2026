{% extends 'base.html' %}
{% block title %}Add Ledger Entry — PNG Compliance Hub 2026{% endblock %}
{% block content %}
<div class="top-bar">
  <div><div class="page-title"><i class="bi bi-plus-lg text-accent"></i> Log Ledger Entry</div>
  <div class="page-subtitle">Record a sale or purchase for GST calculation</div></div>
  <a href="{% url 'gst:dashboard' %}" class="btn-ghost">← Back</a>
</div>
<div style="max-width:540px;margin:0 auto">
  <div class="glass-card">
    <form method="post" action="{% url 'gst:add_entry' %}">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" name="date" class="form-control" required value="{% now 'Y-m-d' %}">
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select name="entry_type" class="form-control form-select">
            <option value="SALE">Sale / Revenue</option>
            <option value="PURCHASE">Purchase / Expense</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-control" required placeholder="e.g. Daily retail sales">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label class="form-label">Amount Excl. GST (K)</label>
          <input type="number" name="amount" class="form-control" required placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">Receipt / Invoice Ref</label>
          <input type="text" name="receipt_ref" class="form-control" placeholder="Optional">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2" placeholder="Optional notes"></textarea>
      </div>
      <div class="alert alert-success" style="margin-bottom:16px">
        <i class="bi bi-lightbulb"></i> GST (10%) will be <strong>automatically calculated</strong> and added to this entry.
      </div>
       <button type="submit" class="btn-accent w-100" style="justify-content:center"><i class="bi bi-check-lg"></i> Save Entry</button>
    </form>
  </div>
</div>
{% endblock %}
