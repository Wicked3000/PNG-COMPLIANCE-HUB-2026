<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#060D1A">
  <meta name="description" content="Sign in to PNG Compliance Hub 2026">
  <title>Sign In — PNG Compliance Hub 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div style="font-size:48px;margin-bottom:8px;color:var(--accent-green)"><i class="bi bi-globe-asia-australia"></i></div>
      <div class="brand-sub" style="font-size:12px;letter-spacing:0.12em">INTERNAL REVENUE COMMISSION</div>
    </div>

    <div class="auth-title">PNG Compliance Hub</div>
    <div class="auth-sub">2026 Tax Compliance Platform for PNG MSMEs</div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> {{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'accounts:login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" id="passwordField">
      </div>

      <!-- Biometric hint (WebAuthn-ready) -->
      <div style="text-align:center;margin:12px 0">
        <button type="button" id="biometricBtn" class="btn-ghost w-100" style="justify-content:center;opacity:0.6;font-size:12px" title="Biometric login (fingerprint/FaceID)" onclick="triggerBiometric()">
          <i class="bi bi-fingerprint"></i> Sign in with Biometrics
        </button>
      </div>

      <button type="submit" class="btn-accent w-100" style="justify-content:center;margin-top:8px">
        Sign In <i class="bi bi-arrow-right"></i>
      </button>
    </form>

    <hr class="divider">
    <div style="text-align:center;font-size:12px;color:var(--text-muted)">
      New to Compliance Hub?
      <a href="{% url 'accounts:register' %}" style="color:var(--accent-green);text-decoration:none;font-weight:600"> Create Account</a>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--text-muted)">
      <i class="bi bi-lock"></i> Secured by IRC-grade encryption · Port Moresby, PNG
    </div>
  </div>
</div>
<script src="/static/js/biometrics.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const isSupported = await checkBiometricSupport();
    if (!isSupported) {
        document.getElementById('biometricBtn').style.display = 'none';
    }
});

async function triggerBiometric() {
    try {
        await loginWithBiometrics();
    } catch (e) {
        console.error('Biometric login error:', e);
    }
}
</script>
</body>
</html>
