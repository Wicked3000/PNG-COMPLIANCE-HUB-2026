<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - {{ APP_NAME }} {{ TAX_YEAR }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/theme.css?v=2.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:460px">
    <div class="auth-logo" style="margin-bottom:16px;display:flex;justify-content:center"><div style="background-color:white;border-radius:50%;padding:8px;box-shadow:0 0 20px rgba(0,229,160,0.5);display:inline-flex"><img src="/static/img/PNG-COM-LOGO.svg" alt="Logo" style="height:80px;width:80px;clip-path:circle(43%);object-fit:cover;"></div></div>
    <div class="auth-title">Create Your Account</div>
    <div class="auth-sub">Register your business with PNG Compliance Hub</div>

    {% if messages %}
      {% for msg in messages %}<div class="alert alert-danger"><i class="bi bi-exclamation-circle"></i> {{ msg }}</div>{% endfor %}
    {% endif %}

    <form method="post" action="{% url 'accounts:register' %}" onsubmit="return validateRegisterForm()">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password1" id="p1" class="form-control" required placeholder="Create a strong password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" id="p2" class="form-control" required placeholder="Repeat your password">
      </div>
      <button type="submit" class="btn-accent w-100" style="justify-content:center;margin-top:8px">
        Create Account <i class="bi bi-arrow-right"></i>
      </button>
    </form>

    <script>
    function validateRegisterForm() {
      const p1 = document.getElementById('p1').value;
      const p2 = document.getElementById('p2').value;
      if (p1 !== p2) {
        alert('❌ Passwords do not match!');
        return false;
      }
      return true;
    }
    </script>

    <hr class="divider">
    <div style="text-align:center;font-size:12px;color:var(--text-muted)">
      Already have an account?
      <a href="{% url 'accounts:login' %}" style="color:var(--accent-green);text-decoration:none;font-weight:600"> Sign In</a>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:12px">
      <a href="{% url 'dashboard:landing' %}" style="color:var(--text-muted);text-decoration:none;">
        <i class="bi bi-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>
</div>
</body>
</html>
